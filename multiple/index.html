        let randomElapsedTime = 0; // 随机练习经过时间
        let isRandomTimerRunning = false; // 随机练习计时器状态

        // 从localStorage加载错题集
        function loadWrongQuestionsSet() {
            const saved = localStorage.getItem('wrongQuestionsSet');
            if (saved) {
                wrongQuestionsSet = JSON.parse(saved);
            }
        }

        // 保存错题集到localStorage
        function saveWrongQuestionsSet() {
            localStorage.setItem('wrongQuestionsSet', JSON.stringify(wrongQuestionsSet));
        }

        // 添加错题到错题集（避免重复）
        function addToWrongQuestionsSet(questionNumber) {
            const exists = wrongQuestionsSet.find(q => q.number === questionNumber);
            if (!exists) {
                const question = questions.find(q => q.number === questionNumber);
                if (question) {
                    wrongQuestionsSet.push(question);
                    saveWrongQuestionsSet();
                }
            }
        }

        // 从错题集中移除
        function removeFromWrongQuestionsSet(questionNumber) {
            wrongQuestionsSet = wrongQuestionsSet.filter(q => q.number !== questionNumber);
            saveWrongQuestionsSet();
        }

        // 计时器相关变量
        let timerInterval = null;
        let startTime = null;
        let elapsedTime = 0;
        let isTimerRunning = false;

        // 格式化时间显示
        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // 更新计时器显示
        function updateTimerDisplay() {
            const timerElement = document.getElementById('timer');
            if (timerElement) {
                timerElement.textContent = formatTime(elapsedTime);
            }
        }

        // 开始计时器
        function startTimer() {
            if (!isTimerRunning) {
                startTime = Date.now() - elapsedTime * 1000;
                isTimerRunning = true;
                timerInterval = setInterval(() => {
                    elapsedTime = Math.floor((Date.now() - startTime) / 1000);
                    updateTimerDisplay();
                }, 1000);
            }
        }

        // 停止计时器
        function stopTimer() {
            if (isTimerRunning) {
                clearInterval(timerInterval);
                isTimerRunning = false;
            }
        }

        // 重置计时器
        function resetTimer() {
            stopTimer();
            elapsedTime = 0;
            startTime = null;
            updateTimerDisplay();
        }

        // 渲染题目
        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            questions.forEach((q, index) => {
                const questionHtml = `
                    <div class="bg-white rounded-lg shadow-md p-4" id="question-${q.number}">
                        <div class="flex items-start mb-3">
                            <span class="flex-shrink-0 w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold mr-3">
                                ${q.number}
                            </span>
                            <div class="flex-1">
                                <h3 class="text-base font-medium text-gray-800">${q.question}</h3>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 ml-11">
                            ${q.options.map(opt => `
                                <div class="relative">
                                    <input type="checkbox"
                                           id="q${q.number}_opt${opt.letter}"
                                           class="option-checkbox sr-only"
                                           data-question="${q.number}"
                                           data-option="${opt.letter}"
                                           onchange="updateProgress()">
                                    <label for="q${q.number}_opt${opt.letter}"
                                           class="flex items-center p-2 border-2 border-gray-200 rounded-lg cursor-pointer hover:border-blue-400 transition">
                                        <span class="flex-shrink-0 w-5 h-5 border-2 border-gray-300 rounded mr-2 flex items-center justify-center">
                                            <span class="check-dot hidden w-2.5 h-2.5 bg-blue-600 rounded-full"></span>
                                        </span>
                                        <span class="font-medium text-gray-700 mr-1 text-sm">${opt.letter}.</span>
                                        <span class="text-gray-600 text-sm">${opt.text}</span>
                                    </label>
                                </div>
                            `).join('')}
                        </div>
                        <div class="ml-11 mt-3 answer-feedback hidden" id="feedback-${q.number}"></div>
                    </div>
                `;
                container.innerHTML += questionHtml;
            });

            // 启动计时器
            startTimer();
        }

        // 更新进度
        function updateProgress() {
            const checkboxes = document.querySelectorAll('.option-checkbox');
            const answeredQuestions = new Set();

            checkboxes.forEach(cb => {
                if (cb.checked) {
                    answeredQuestions.add(cb.dataset.question);
                }
            });

            const progress = answeredQuestions.size;
            const total = questions.length;
            const percentage = (progress / total) * 100;

            document.getElementById('progress-text').textContent = `${progress} / ${total}`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        // 提交考试
        function submitExam() {
            // 停止计时器
            stopTimer();

            // 收集用户答案
            userAnswers = {};
            const checkboxes = document.querySelectorAll('.option-checkbox:checked');

            checkboxes.forEach(cb => {
                const qNum = cb.dataset.question;
                const optLetter = cb.dataset.option;

                if (!userAnswers[qNum]) {
                    userAnswers[qNum] = [];
                }
                userAnswers[qNum].push(optLetter);
            });

            // 检查是否有未完成的题目
            const answeredCount = Object.keys(userAnswers).length;
            if (answeredCount < questions.length) {
                if (!confirm(`你还有 ${questions.length - answeredCount} 道题未作答，确定要提交吗？`)) {
                    return;
                }
            }

            // 评分并显示结果
            gradeExam();
        }

        // 评分
        function gradeExam() {
            let correctCount = 0;
            let wrongCount = 0;
            const wrongQuestions = [];

            questions.forEach(q => {
                const userAns = userAnswers[q.number] || [];
                const correctAns = q.options.filter(o => o.is_correct).map(o => o.letter);

                // 检查答案是否正确
                const isCorrect = arraysEqual(userAns.sort(), correctAns.sort());

                if (isCorrect) {
                    correctCount++;
                } else {
                    wrongCount++;
                    // 添加到错题集
                    addToWrongQuestionsSet(q.number);
                    wrongQuestions.push({
                        question: q,
                        userAns: userAns,
                        correctAns: correctAns
                    });
                }

                // 显示反馈
                showFeedback(q, userAns, correctAns, isCorrect);

        // ==================== 随机练习功能 ====================

        // 随机选择20道题（考虑知识点分布）
        function selectRandomQuestions() {
            // 按题目号段分组，确保覆盖不同知识点
            const groups = [
                { start: 1, end: 20, count: 3 },    // 职业道德基础
                { start: 21, end: 40, count: 3 },   // 团队合作
                { start: 41, end: 60, count: 3 },   // 沟通技巧
                { start: 61, end: 80, count: 3 },   // 数据标注基础
                { start: 81, end: 100, count: 2 },  // 标注质量控制
                { start: 101, end: 120, count: 2 }, // AI基础概念
                { start: 121, end: 140, count: 2 }, // 模型训练
                { start: 141, end: 160, count: 2 }  // 项目管理
            ];

            let selectedQuestions = [];

            // 从每个组中随机选择指定数量的题目
            groups.forEach(group => {
                const groupQuestions = questions.filter(q =>
                    q.number >= group.start && q.number <= group.end
                );

                // 随机打乱并选择指定数量
                const shuffled = groupQuestions.sort(() => Math.random() - 0.5);
                selectedQuestions.push(...shuffled.slice(0, group.count));
            });

            // 如果不足20题，从剩余题目中随机补充
            while (selectedQuestions.length < 20) {
                const remaining = questions.filter(q =>
                    !selectedQuestions.find(sq => sq.number === q.number)
                );
                if (remaining.length === 0) break;
                const randomIndex = Math.floor(Math.random() * remaining.length);
                const question = remaining[randomIndex];
                if (!selectedQuestions.find(sq => sq.number === question.number)) {
                    selectedQuestions.push(question);
                }
            }

            // 按题目编号排序
            return selectedQuestions.sort((a, b) => a.number - b.number);
        }

            randomPracticeQuestions.forEach(q => {
                const userAns = randomPracticeAnswers[q.number] || [];
                const correctAns = q.options.filter(o => o.is_correct).map(o => o.letter);

                // 排序后比较
                userAns.sort();
                correctAns.sort();

                const isCorrect = arraysEqual(userAns, correctAns);

                if (isCorrect) {
                    correctCount++;
                } else {
                    wrongCount++;
                    wrongQuestions.push({
                        question: q,
                        userAns: userAns,
                        correctAns: correctAns
                    });
                }

                // 显示反馈
                showRandomFeedback(q, userAns, correctAns, isCorrect);
            });

            // 显示结果弹窗
            showRandomResultModal(correctCount, wrongCount, wrongQuestions);
        }

        // 显示随机练习反馈
        function showRandomFeedback(question, userAns, correctAns, isCorrect) {
            const feedbackEl = document.getElementById(`random-feedback-${question.number}`);
            const questionEl = document.getElementById(`random-q-${question.number}`);

            feedbackEl.classList.remove('hidden');

            // 禁用所有复选框
            questionEl.querySelectorAll('.random-option-checkbox').forEach(cb => {
                cb.disabled = true;
                const label = cb.nextElementSibling;
                const optLetter = cb.dataset.option;

                // 移除之前的样式
                label.classList.remove('correct-answer', 'wrong-answer', 'missed-answer');

                // 添加样式
                if (question.options.find(o => o.letter === optLetter).is_correct) {
                    label.classList.add('correct-answer');
                } else if (userAns.includes(optLetter)) {
                    label.classList.add('wrong-answer');
                }
            });

            // 显示反馈信息
            if (isCorrect) {
                feedbackEl.innerHTML = `
                    <div class="flex items-center text-green-600">
                        <i class="fa fa-check-circle text-xl mr-2"></i>
                        <span class="font-medium">回答正确！</span>
                    </div>
                `;
            } else {
                const missedAns = correctAns.filter(a => !userAns.includes(a));
                const wrongAns = userAns.filter(a => !correctAns.includes(a));
                feedbackEl.innerHTML = `
                    <div class="text-red-600">
                        <div class="flex items-center mb-2">
                            <i class="fa fa-times-circle text-xl mr-2"></i>
                            <span class="font-medium">回答错误</span>
                        </div>
                        <div class="text-sm">
                            <p><strong>你的答案：</strong>${userAns.length > 0 ? userAns.map(ans => {
                                const opt = question.options.find(o => o.letter === ans);
                                return opt ? `${ans}. ${opt.text}` : ans;
                            }).join('；') : '未作答'}</p>
                            <p><strong>正确答案：</strong>${correctAns.map(ans => {
                                const opt = question.options.find(o => o.letter === ans);
                                return `${ans}. ${opt.text}`;
                            }).join('；')}</p>
                            ${wrongAns.length > 0 || missedAns.length > 0 ? `<p class="text-orange-600"><strong>错误分析：</strong>${wrongAns.length > 0 ? `错选了${wrongAns.map(ans => {
                                const opt = question.options.find(o => o.letter === ans);
                                return opt ? `${ans}. ${opt.text}` : ans;
                            }).join('；')}` : ''}${wrongAns.length > 0 && missedAns.length > 0 ? '；' : ''}${missedAns.length > 0 ? `漏选了${missedAns.map(ans => {
                                const opt = question.options.find(o => o.letter === ans);
                                return `${ans}. ${opt.text}`;
                            }).join('；')}` : ''}</p>` : ''}
                        </div>
                    </div>
                `;
            }
        }

        // 显示随机练习结果弹窗
        function showRandomResultModal(correctCount, wrongCount, wrongQuestions) {
            const percentage = ((correctCount / randomPracticeQuestions.length) * 100).toFixed(1);
            const pass = correctCount >= randomPracticeQuestions.length * 0.6;

            const modalHtml = `
                <div id="random-result-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div class="bg-white rounded-lg shadow-xl p-8 max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                        <div class="text-center mb-6">
                            <div class="text-6xl mb-4">${pass ? '🎉' : '💪'}</div>
                            <h2 class="text-3xl font-bold ${pass ? 'text-green-600' : 'text-orange-600'} mb-2">
                                ${pass ? '练习完成！' : '继续加油！'}
                            </h2>
                            <p class="text-gray-600">
                                ${pass ? '你已经掌握了大部分知识点' : '还需要多加练习哦'}
                            </p>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-6">
                            <div class="bg-green-50 rounded-lg p-4 text-center">
                                <div class="text-3xl font-bold text-green-600">${correctCount}</div>
                                <div class="text-sm text-gray-600">答对题数</div>
                            </div>
                            <div class="bg-red-50 rounded-lg p-4 text-center">
                                <div class="text-3xl font-bold text-red-600">${wrongCount}</div>
                                <div class="text-sm text-gray-600">答错题数</div>
                            </div>
                            <div class="bg-blue-50 rounded-lg p-4 text-center">
                                <div class="text-3xl font-bold text-blue-600">${percentage}%</div>
                                <div class="text-sm text-gray-600">正确率</div>
                            </div>
                        </div>

                        <div class="text-gray-600 mb-6">
                            <div class="text-center">
                                <p>总用时：<strong>${formatTime(randomElapsedTime)}</strong></p>
                            </div>
                        </div>

                        ${wrongCount > 0 ? `
                            <div class="mb-6">
                                <h3 class="text-lg font-bold text-gray-800 mb-3">
                                    <i class="fa fa-exclamation-triangle text-orange-500"></i>
                                    答错的题目
                                </h3>
                                <div class="space-y-4 max-h-96 overflow-y-auto">
                                    ${wrongQuestions.map(wq => `
                                        <div class="bg-orange-50 rounded-lg p-4 border-l-4 border-orange-400">
                                            <div class="mb-3">
                                                <span class="inline-block bg-orange-500 text-white text-xs px-2 py-1 rounded mb-2">第${wq.question.number}题</span>
                                                <p class="font-medium text-gray-800 text-base">${wq.question.question}</p>
                                            </div>
                                            <div class="text-sm space-y-2">
                                                <div class="flex items-start">
                                                    <i class="fa fa-times-circle text-red-500 mt-1 mr-2"></i>
                                                    <div>
                                                        <span class="font-medium text-gray-700">你的答案：</span>
                                                        <span class="text-red-600">${wq.userAns.length > 0 ? wq.userAns.map(ans => {
                                                            const opt = wq.question.options.find(o => o.letter === ans);
                                                            return opt ? `${ans}. ${opt.text}` : ans;
                                                        }).join('；') : '未作答'}</span>
                                                    </div>
                                                </div>
                                                <div class="flex items-start">
                                                    <i class="fa fa-check-circle text-green-500 mt-1 mr-2"></i>
                                                    <div>
                                                        <span class="font-medium text-gray-700">正确答案：</span>
                                                        <span class="text-green-600">${wq.correctAns.map(ans => {
                                                            const opt = wq.question.options.find(o => o.letter === ans);
                                                            return `${ans}. ${opt.text}`;
                                                        }).join('；')}</span>
                                                    </div>
                                                </div>
                                                ${wq.userAns.length > 0 && wq.correctAns.filter(a => !wq.userAns.includes(a)).length > 0 ? `
                                                    <div class="flex items-start">
                                                        <i class="fa fa-exclamation-circle text-yellow-500 mt-1 mr-2"></i>
                                                        <div>
                                                            <span class="font-medium text-gray-700">漏选选项：</span>
                                                            <span class="text-yellow-600">${wq.correctAns.filter(a => !wq.userAns.includes(a)).map(ans => {
                                                                const opt = wq.question.options.find(o => o.letter === ans);
                                                                return `${ans}. ${opt.text}`;
                                                            }).join('；')}</span>
                                                        </div>
                                                    </div>
                                                ` : ''}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <div class="flex gap-3">
                            <button onclick="closeRandomPracticeResult()" class="flex-1 px-6 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition font-bold">
                                <i class="fa fa-arrow-left mr-2"></i>
                                返回首页
                            </button>
                            <button onclick="backToRandomQuestions()" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-bold">
                                <i class="fa fa-eye mr-2"></i>
                                查看题目
                            </button>
                            <button onclick="restartRandomPractice()" class="flex-1 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-bold">
                                <i class="fa fa-random mr-2"></i>
                                再练一次
                            </button>
                        </div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        // 关闭随机练习结果弹窗
        function closeRandomPracticeResult() {
            const modal = document.getElementById('random-result-modal');
            if (modal) {
                modal.remove();
            }
            closeRandomPractice();
        }

        // 返回查看随机题目
        function backToRandomQuestions() {
            const modal = document.getElementById('random-result-modal');
            if (modal) {
                modal.remove();
            }
            // 不关闭随机练习界面，只关闭弹窗，用户可以查看题目和答案
        }

        // 重新开始随机练习
        function restartRandomPractice() {
            const modal = document.getElementById('random-result-modal');
            if (modal) {
                modal.remove();
            }

            // 重置计时器
            resetRandomTimer();

            // 重新开始随机练习
            startRandomPractice();
        }

        // 关闭随机练习
        function closeRandomPractice() {
            // 停止计时器
            stopRandomTimer();

            // 隐藏固定顶部信息栏
            document.getElementById('random-practice-header-bar').classList.add('hidden');

            // 隐藏随机练习界面
            document.getElementById('random-practice-screen').classList.add('hidden');

            // 显示开始界面
            document.getElementById('start-screen').classList.remove('hidden');

            // 移除结果弹窗
            const modal = document.getElementById('random-result-modal');
            if (modal) {
                modal.remove();
            }

            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== 搜索功能 ====================

        let searchTimeout = null;

        // 搜索题目
        function searchQuestions(keyword) {
            const clearBtn = document.getElementById('clear-search-btn');

            // 显示/隐藏清除按钮
            if (keyword.trim()) {
                clearBtn.style.display = 'block';
            } else {
                clearBtn.style.display = 'none';
                closeSearchModal();
                return;
            }

            // 防抖处理
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                performSearch(keyword.trim());
            }, 300);
        }

        // 执行搜索
        function performSearch(keyword) {
            if (!keyword) {
                closeSearchModal();
                return;
            }

            // 在所有题目中搜索
            const results = questions.filter(q => {
                return q.question.toLowerCase().includes(keyword.toLowerCase());
            });

            // 显示搜索结果
            showSearchResults(results, keyword);
        }

        // 显示搜索结果
        function showSearchResults(results, keyword) {
            const modal = document.getElementById('search-modal');
            const resultsContainer = document.getElementById('search-results');

            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fa fa-search text-4xl mb-4"></i>
                        <p>未找到包含"${keyword}"的题目</p>
                    </div>
                `;
            } else {
                resultsContainer.innerHTML = results.map(q => {
                    // 高亮关键词
                    const highlightedQuestion = highlightKeyword(q.question, keyword);

                    return `
                        <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 hover:border-blue-400 transition cursor-pointer" onclick="jumpToQuestion(${q.number})">
                            <div class="flex items-start gap-3">
                                <span class="flex-shrink-0 w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-sm">
                                    ${q.number}
                                </span>
                                <div class="flex-1">
                                    <h3 class="font-medium text-gray-800 mb-2">${highlightedQuestion}</h3>
                                    <div class="flex flex-wrap gap-2">
                                        ${q.options.map(opt => {
                                            if (opt.is_correct) {
                                                // 正确答案 - 绿色标签
                                                return `
                                                    <span class="inline-flex items-center px-2 py-1 bg-green-100 text-green-800 rounded text-xs">
                                                        <i class="fa fa-check mr-1"></i>
                                                        ${opt.letter}. ${opt.text}
                                                    </span>
                                                `;
                                            } else {
                                                // 错误选项 - 灰色标签
                                                return `
                                                    <span class="inline-flex items-center px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">
                                                        ${opt.letter}. ${opt.text}
                                                    </span>
                                                `;
                                            }
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // 显示弹窗
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // 高亮关键词
        function highlightKeyword(text, keyword) {
            if (!keyword) return text;
            const regex = new RegExp(`(${keyword})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 px-1 rounded">$1</mark>');
        }

        // 跳转到指定题目
        function jumpToQuestion(questionNum) {
            closeSearchModal();

            // 滚动到题目
            const questionElement = document.getElementById(`question-${questionNum}`);
            if (questionElement) {
                questionElement.scrollIntoView({ behavior: 'smooth', block: 'center' });

                // 高亮效果
                questionElement.classList.add('ring-4', 'ring-blue-400', 'ring-opacity-50');
                setTimeout(() => {
                    questionElement.classList.remove('ring-4', 'ring-blue-400', 'ring-opacity-50');
                }, 2000);
            }
        }

        // 清除搜索
        function clearSearch() {
            const searchInput = document.getElementById('search-input');
            searchInput.value = '';
            searchQuestions('');
        }

        // 关闭搜索弹窗
        function closeSearchModal() {
            const modal = document.getElementById('search-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body>
</html>
