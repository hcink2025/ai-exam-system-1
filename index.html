</script>
<script>
var currentFilter = 'all';
var currentPage = 1;
var pageSize = 20;
var userAnswers = {};
var submittedQuestions = {};
var showAnswerQuestions = {};
var wrongQuestions = {};
var favoriteQuestions = {};
var quizMode = false;
var quizQuestions = [];

function saveToStorage() {
    localStorage.setItem('exam_wrongQuestions', JSON.stringify(wrongQuestions));
    localStorage.setItem('exam_favoriteQuestions', JSON.stringify(favoriteQuestions));
    localStorage.setItem('exam_userAnswers', JSON.stringify(userAnswers));
    localStorage.setItem('exam_submittedQuestions', JSON.stringify(submittedQuestions));
    localStorage.setItem('exam_currentPage', currentPage.toString());
    localStorage.setItem('exam_currentFilter', currentFilter);

    // 显示保存提示
    var indicator = document.getElementById('progressIndicator');
    if (indicator) {
        indicator.classList.remove('hidden');
        setTimeout(function() {
            indicator.classList.add('hidden');
        }, 2000);
    }
}

function loadFromStorage() {
    try {
        var savedWrong = localStorage.getItem('exam_wrongQuestions');
        var savedFavorite = localStorage.getItem('exam_favoriteQuestions');
        var savedAnswers = localStorage.getItem('exam_userAnswers');
        var savedSubmitted = localStorage.getItem('exam_submittedQuestions');
        var savedPage = localStorage.getItem('exam_currentPage');
        var savedFilter = localStorage.getItem('exam_currentFilter');
        if (savedWrong) wrongQuestions = JSON.parse(savedWrong);
        if (savedFavorite) favoriteQuestions = JSON.parse(savedFavorite);
        if (savedAnswers) userAnswers = JSON.parse(savedAnswers);
        if (savedSubmitted) submittedQuestions = JSON.parse(savedSubmitted);
        if (savedPage) currentPage = parseInt(savedPage, 10);
        if (savedFilter) currentFilter = savedFilter;
    } catch (e) {
        console.log('加载本地存储失败');
    }
}

function init() {
    loadFromStorage();

    // 恢复筛选按钮状态
    var btns = {'all':'btnAll', '单选':'btnSingle', '多选':'btnMulti', '判断':'btnJudge', 'wrong':'btnWrong', 'favorite':'btnFavorite'};
    for (var key in btns) {
        var el = document.getElementById(btns[key]);
        if (el) {
            el.className = 'px-4 py-2 ' + (key === currentFilter ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700') + ' rounded';
        }
    }

    document.getElementById('singleCount').textContent = questionsData.filter(function(q) { return q.type === '单选'; }).length;
    document.getElementById('multiCount').textContent = questionsData.filter(function(q) { return q.type === '多选'; }).length;
    document.getElementById('judgeCount').textContent = questionsData.filter(function(q) { return q.type === '判断'; }).length;
    updateWrongCount();
    updateFavoriteCount();
    renderQuestions();

    // 显示恢复提示
    var answeredCount = Object.keys(submittedQuestions).length;
    if (answeredCount > 0) {
        showRestoreNotification(answeredCount);
    }
}

// 显示恢复进度提示
function showRestoreNotification(count) {
    var notification = document.createElement('div');
    notification.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-3 rounded-lg shadow-lg z-50 flex items-center gap-3';
    notification.innerHTML = '<i class="fa fa-check-circle"></i><span>已恢复答题进度，已完成 ' + count + ' 题</span><button onclick="this.parentElement.remove()" class="ml-2 hover:bg-green-600 rounded px-2"><i class="fa fa-times"></i></button>';
    document.body.appendChild(notification);
    setTimeout(function() {
        if (notification.parentElement) notification.remove();
    }, 5000);
}

function updateWrongCount() {
    document.getElementById('wrongCount').textContent = Object.keys(wrongQuestions).length;
}

function updateFavoriteCount() {
    document.getElementById('favoriteCount').textContent = Object.keys(favoriteQuestions).length;
}

function getFilteredQuestions() {
    var f = questionsData;

    if (currentFilter === 'wrong') {
        f = f.filter(function(q) { return wrongQuestions[q.id]; });
    } else if (currentFilter === 'favorite') {
        f = f.filter(function(q) { return favoriteQuestions[q.id]; });
    } else if (currentFilter !== 'all') {
        f = f.filter(function(q) { return q.type === currentFilter; });
    }

    var s = document.getElementById('searchInput').value.toLowerCase();
    if (s) {
        f = f.filter(function(q) {
            return q.question.toLowerCase().indexOf(s) >= 0 ||
                   q.options.some(function(o) { return o.content.toLowerCase().indexOf(s) >= 0; });
        });
    }
    return f;
}

function renderQuestions() {
    var f = quizMode ? quizQuestions : getFilteredQuestions();
    var start = (currentPage - 1) * pageSize;
    var p = f.slice(start, start + pageSize);
    var c = document.getElementById('questionsList');

    if (f.length === 0) {
        c.innerHTML = '<div class="text-center text-gray-500 py-8">没有题目</div>';
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('submitPanel').classList.add('hidden');
        return;
    }

    var pageSelCount = 0;
    for (var i = 0; i < p.length; i++) {
        if (userAnswers[p[i].id] && userAnswers[p[i].id].length > 0 && !submittedQuestions[p[i].id]) {
            pageSelCount++;
        }
    }
    document.getElementById('pageSelected').textContent = pageSelCount;
    document.getElementById('submitPanel').classList.toggle('hidden', pageSelCount === 0 || quizMode);

    var html = '';
    for (var i = 0; i < p.length; i++) {
        var q = p[i];
        var typeLabel = q.type;
        var isMulti = q.type === '多选';
        var isJudge = q.type === '判断';
        var a = userAnswers[q.id] || [];
        var hasAnswer = a.length > 0;
        var isSubmitted = submittedQuestions[q.id];
        var isShowAnswer = showAnswerQuestions[q.id];
        var isWrong = wrongQuestions[q.id];

        var isCorrect = null;
        if (isSubmitted && hasAnswer) {
            isCorrect = a.slice().sort().join(',') === q.answer.slice().sort().join(',');
        }

        var bgClass = isWrong && !isSubmitted ? 'wrong-question' : 'bg-white';
        if (favoriteQuestions[q.id]) bgClass += ' favorite-question';
        html += '<div class="' + bgClass + ' rounded-lg shadow p-6">';
        html += '<div class="flex justify-between mb-3">';
        var typeColors = {'单选':'bg-blue-100 text-blue-700', '多选':'bg-purple-100 text-purple-700', '判断':'bg-green-100 text-green-700'};
        html += '<span class="text-sm px-3 py-1 rounded-full ' + typeColors[q.type] + '">' + typeLabel + '</span>';
        if (isWrong) html += '<span class="text-xs px-2 py-1 rounded bg-red-100 text-red-600"><i class="fa fa-times"></i> 易错</span>';
        html += '<span class="text-gray-400 text-sm">第' + q.id + '题</span></div>';
        var isFav = favoriteQuestions[q.id];
        html += '<div class="flex justify-between items-start mb-4">';
        html += '<div class="text-lg flex-1">' + q.question + '</div>';
        html += '<button onclick="toggleFavorite(' + q.id + ')" class="ml-2 text-xl ' + (isFav ? 'text-yellow-500' : 'text-gray-300') + '" title="' + (isFav ? '取消收藏' : '收藏') + '"><i class="fa ' + (isFav ? 'fa-heart' : 'fa-heart-o') + '"></i></button>';
        html += '</div>';
        html += '<div class="space-y-2">';

        for (var j = 0; j < q.options.length; j++) {
            var o = q.options[j];
            var cls = 'option-btn border-2 border-gray-200 px-4 py-3 rounded-lg flex items-center';

            if (isSubmitted || isShowAnswer) {
                cls += ' disabled';
                if (a.indexOf(o.letter) >= 0) {
                    if (q.answer.indexOf(o.letter) >= 0) cls += ' correct';
                    else cls += ' wrong';
                } else if (q.answer.indexOf(o.letter) >= 0) {
                    cls += ' correct';
                }
            } else {
                if (a.indexOf(o.letter) >= 0) cls += ' selected';
            }

            var clickHandler = (isSubmitted || isShowAnswer) ? '' : 'onclick="selectOption(' + q.id + ',\'' + o.letter + '\', ' + isMulti + ')"';
            html += '<div class="' + cls + '" ' + clickHandler + '>';
            html += '<span class="font-bold mr-3">' + o.letter + '</span>';
            html += '<span class="flex-1">' + o.content + '</span>';
            if ((isSubmitted || isShowAnswer) && q.answer.indexOf(o.letter) >= 0) {
                html += '<i class="fa fa-check ml-2 text-white"></i>';
            }
            html += '</div>';
        }
        html += '</div>';

        html += '<div class="mt-4 pt-4 border-t flex items-center justify-between text-sm">';

        if (isSubmitted) {
            html += '<div>';
            html += '<span class="' + (isCorrect ? 'text-green-600' : 'text-red-600') + ' font-semibold">' + (isCorrect ? '正确' : '错误') + '</span>';
            html += '<span class="ml-4 text-gray-500">正确答案: <strong class="text-green-600">' + q.answer.join(',') + '</strong></span>';
            html += '</div>';
        } else if (!isSubmitted) {
            // 所有模式下都只显示查看答案按钮
            var answerBtnText = isShowAnswer ? '隐藏答案' : '查看答案';
            html += '<span></span>';
            html += '<button onclick="toggleShowAnswer(' + q.id + ')" class="px-3 py-1 ' + (isShowAnswer ? 'bg-gray-500' : 'bg-orange-500') + ' text-white rounded hover:opacity-80">' + answerBtnText + '</button>';
        }

        html += '</div></div>';
    }
    c.innerHTML = html;
    renderPagination(f.length);
    updateStats();
}

function selectOption(q, l, m) {
    if (submittedQuestions[q] || showAnswerQuestions[q]) return;

    if (!userAnswers[q]) userAnswers[q] = [];
    if (m) {
        var idx = userAnswers[q].indexOf(l);
        if (idx >= 0) userAnswers[q].splice(idx, 1);
        else userAnswers[q].push(l);
    } else {
        userAnswers[q] = [l];
    }
    saveToStorage();
    renderQuestions();
}

function submitSingleAnswer(qId) {
    if (!userAnswers[qId] || userAnswers[qId].length === 0) return;
    submittedQuestions[qId] = true;
    showAnswerQuestions[qId] = false;

    // 检查答案对错，更新易错题状态
    var q = questionsData.find(function(x) { return x.id === qId; });
    var isCorrect = userAnswers[qId].slice().sort().join(',') === q.answer.slice().sort().join(',');
    if (isCorrect) {
        // 答对了，从易错题中移除
        delete wrongQuestions[qId];
    } else {
        // 答错了，加入易错题
        wrongQuestions[qId] = true;
    }
    updateWrongCount();
    saveToStorage();

    renderQuestions();
}

function submitPageAnswers() {
    var f = getFilteredQuestions();
    var start = (currentPage - 1) * pageSize;
    var p = f.slice(start, start + pageSize);

    var wrongList = [];
    var total = 0;
    var correct = 0;

    for (var i = 0; i < p.length; i++) {
        var q = p[i];
        if (userAnswers[q.id] && userAnswers[q.id].length > 0 && !submittedQuestions[q.id]) {
            submittedQuestions[q.id] = true;
            showAnswerQuestions[q.id] = false;
            total++;
            var isCorrect = userAnswers[q.id].slice().sort().join(',') === q.answer.slice().sort().join(',');
            if (isCorrect) {
                correct++;
                // 答对了，从易错题中移除
                delete wrongQuestions[q.id];
            } else {
                // 答错了，加入易错题
                wrongQuestions[q.id] = true;
                wrongList.push({id: q.id, question: q.question, userAnswer: userAnswers[q.id].join(','), correctAnswer: q.answer.join(',')});
            }
        }
    }

    updateWrongCount();

    if (total > 0) {
        var score = Math.round(correct / total * 100);
        document.getElementById('pageResultScore').textContent = score + '%';
        document.getElementById('pageResultScore').className = 'text-5xl font-bold mb-4 ' + (score >= 60 ? 'text-green-500' : 'text-red-500');
        document.getElementById('pageResultTotal').textContent = total;
        document.getElementById('pageResultCorrect').textContent = correct;

        if (wrongList.length > 0) {
            var wrongHtml = '';
            for (var i = 0; i < wrongList.length; i++) {
                var w = wrongList[i];
                wrongHtml += '<div class="py-2 border-b border-gray-200"><strong class="text-gray-700">第' + w.id + '题</strong><br>';
                wrongHtml += '<span class="text-sm text-gray-600">' + w.question.substring(0, 50) + '...</span><br>';
                wrongHtml += '<span class="text-red-500">你的答案: ' + w.userAnswer + '</span> → ';
                wrongHtml += '<span class="text-green-600">正确答案: ' + w.correctAnswer + '</span></div>';
            }
            document.getElementById('pageWrongList').innerHTML = wrongHtml;
            document.getElementById('pageWrongPanel').classList.remove('hidden');
        } else {
            document.getElementById('pageWrongPanel').classList.add('hidden');
        }

        document.getElementById('pageResultModal').classList.remove('hidden');
    }

    saveToStorage();
    renderQuestions();
}

function showPageAnswers() {
    var f = getFilteredQuestions();
    var start = (currentPage - 1) * pageSize;
    var p = f.slice(start, start + pageSize);

    for (var i = 0; i < p.length; i++) {
        var q = p[i];
        if (!submittedQuestions[q.id]) {
            showAnswerQuestions[q.id] = true;
            userAnswers[q.id] = [];
        }
    }
    renderQuestions();
}

function toggleShowAnswer(qId) {
    if (showAnswerQuestions[qId]) {
        showAnswerQuestions[qId] = false;
    } else {
        showAnswerQuestions[qId] = true;
        if (!submittedQuestions[qId]) {
            userAnswers[qId] = [];
        }
    }
    renderQuestions();
}

function renderPagination(t) {
    var tp = Math.ceil(t / pageSize);
    var c = document.getElementById('pagination');
    if (tp <= 1) { c.innerHTML = '<span class="text-gray-500">共' + t + '题</span>'; return; }

    var h = '<span class="text-gray-500">页码:</span> ';
    if (currentPage > 1) h += '<button onclick="goToPage(1)" class="px-3 py-1 mx-1 bg-gray-200 rounded">&lt;&lt;</button>';
    if (currentPage > 1) h += '<button onclick="goToPage(' + (currentPage-1) + ')" class="px-3 py-1 mx-1 bg-gray-200 rounded">&lt;</button>';

    for (var i = Math.max(1, currentPage - 2); i <= Math.min(tp, currentPage + 2); i++) {
        if (i === currentPage) h += '<span class="px-3 py-1 mx-1 bg-blue-500 text-white rounded">' + i + '</span>';
        else h += '<button onclick="goToPage(' + i + ')" class="px-3 py-1 mx-1 bg-gray-200 rounded">' + i + '</button>';
    }

    if (currentPage < tp) h += '<button onclick="goToPage(' + (currentPage+1) + ')" class="px-3 py-1 mx-1 bg-gray-200 rounded">&gt;</button>';
    if (currentPage < tp) h += '<button onclick="goToPage(' + tp + ')" class="px-3 py-1 mx-1 bg-gray-200 rounded">&gt;&gt;</button>';
    h += '<span class="ml-4 text-gray-500">共' + t + '题</span>';
    c.innerHTML = h;
}

function goToPage(p) { currentPage = p; saveToStorage(); renderQuestions(); window.scrollTo(0, 0); }

function filterByType(t) {
    currentFilter = t;
    currentPage = 1;

    // 切换到易错题时，清除已提交状态，允许重新作答
    if (t === 'wrong') {
        for (var key in wrongQuestions) {
            delete submittedQuestions[key];
            delete userAnswers[key];
            delete showAnswerQuestions[key];
        }
    }

    saveToStorage();
    renderQuestions();
    var btns = {'all':'btnAll', '单选':'btnSingle', '多选':'btnMulti', '判断':'btnJudge', 'wrong':'btnWrong', 'favorite':'btnFavorite'};
    for (var key in btns) {
        var el = document.getElementById(btns[key]);
        if (el) {
            el.className = 'px-4 py-2 ' + (key === t ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700') + ' rounded';
        }
    }
}

function searchQuestions() { currentPage = 1; renderQuestions(); }

function toggleFavorite(qId) {
    if (favoriteQuestions[qId]) {
        delete favoriteQuestions[qId];
    } else {
        favoriteQuestions[qId] = true;
    }
    saveToStorage();
    updateFavoriteCount();
    renderQuestions();
}

function clearAll() {
    if (confirm('确定清空所有答题记录？')) {
        userAnswers = {};
        submittedQuestions = {};
        showAnswerQuestions = {};
        wrongQuestions = {};
        favoriteQuestions = {};
        currentPage = 1;
        currentFilter = 'all';
        // 清除 localStorage
        localStorage.removeItem('exam_wrongQuestions');
        localStorage.removeItem('exam_favoriteQuestions');
        localStorage.removeItem('exam_userAnswers');
        localStorage.removeItem('exam_submittedQuestions');
        localStorage.removeItem('exam_currentPage');
        localStorage.removeItem('exam_currentFilter');
        if (quizMode) closeQuiz();
        updateWrongCount();
        updateFavoriteCount();
        document.getElementById('searchInput').value = '';
        // 重置筛选按钮状态
        var btns = {'all':'btnAll', '单选':'btnSingle', '多选':'btnMulti', '判断':'btnJudge', 'wrong':'btnWrong', 'favorite':'btnFavorite'};
        for (var key in btns) {
            var el = document.getElementById(btns[key]);
            if (el) {
                el.className = 'px-4 py-2 ' + (key === 'all' ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-700') + ' rounded';
            }
        }
        renderQuestions();
    }
}

function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
    }
    return arr;
}

function showRandomQuiz() {
    var singles = shuffle(questionsData.filter(function(q) { return q.type === '单选'; }).slice()).slice(0, 15);
    var multis = shuffle(questionsData.filter(function(q) { return q.type === '多选'; }).slice()).slice(0, 3);
    var judges = shuffle(questionsData.filter(function(q) { return q.type === '判断'; }).slice()).slice(0, 2);

    quizQuestions = singles.concat(multis).concat(judges);
    quizMode = true;
    currentPage = 1;
    userAnswers = {};
    submittedQuestions = {};
    showAnswerQuestions = {};

    document.getElementById('quizTitleBottom').textContent = '随机测验';
    document.getElementById('quizSubmitPanel').classList.remove('hidden');
    document.getElementById('submitPanel').classList.add('hidden');
    document.getElementById('quizTotalBottom').textContent = quizQuestions.length;
    document.getElementById('quizAnsweredBottom').textContent = 0;
    renderQuestions();
}

function showMockExam() {
    var singles = shuffle(questionsData.filter(function(q) { return q.type === '单选'; }).slice()).slice(0, 80);
    var multis = shuffle(questionsData.filter(function(q) { return q.type === '多选'; }).slice()).slice(0, 10);
    var judges = shuffle(questionsData.filter(function(q) { return q.type === '判断'; }).slice()).slice(0, 10);

    quizQuestions = singles.concat(multis).concat(judges);
    quizMode = true;
    currentPage = 1;
    userAnswers = {};
    submittedQuestions = {};
    showAnswerQuestions = {};

    document.getElementById('quizTitleBottom').textContent = '模拟考试';
    document.getElementById('quizSubmitPanel').classList.remove('hidden');
    document.getElementById('submitPanel').classList.add('hidden');
    document.getElementById('quizTotalBottom').textContent = quizQuestions.length;
    document.getElementById('quizAnsweredBottom').textContent = 0;
    renderQuestions();
}

function submitAllAnswers() {
    var wrongList = [];
    var total = 0;
    var correct = 0;

    for (var i = 0; i < quizQuestions.length; i++) {
        var q = quizQuestions[i];
        var a = userAnswers[q.id] || [];

        if (a.length > 0) {
            submittedQuestions[q.id] = true;
            total++;
            var isCorrect = a.slice().sort().join(',') === q.answer.slice().sort().join(',');
            if (isCorrect) {
                correct++;
                // 答对了，从易错题中移除
                delete wrongQuestions[q.id];
            } else {
                // 答错了，加入易错题
                wrongQuestions[q.id] = true;
                wrongList.push({id: q.id, question: q.question, userAnswer: a.join(','), correctAnswer: q.answer.join(',')});
            }
        }
    }

    updateWrongCount();

    var score = total > 0 ? Math.round(correct / total * 100) : 0;
    document.getElementById('resultScore').textContent = score + '%';
    document.getElementById('resultScore').className = 'text-5xl font-bold mb-4 ' + (score >= 60 ? 'text-green-500' : 'text-red-500');
    document.getElementById('resultAnswered').textContent = total;
    document.getElementById('resultCorrect').textContent = correct;

    if (wrongList.length > 0) {
        var wrongHtml = '';
        for (var i = 0; i < wrongList.length; i++) {
            var w = wrongList[i];
            wrongHtml += '<div class="py-1"><strong>第' + w.id + '题:</strong> 你的:' + w.userAnswer + ' 正确:<span class="text-green-600">' + w.correctAnswer + '</span></div>';
        }
        document.getElementById('wrongList').innerHTML = wrongHtml;
        document.getElementById('wrongListPanel').classList.remove('hidden');
    } else {
        document.getElementById('wrongListPanel').classList.add('hidden');
    }

    document.getElementById('resultModal').classList.remove('hidden');
    renderQuestions();
}

function closeModal() { document.getElementById('resultModal').classList.add('hidden'); }
function closePageResult() { document.getElementById('pageResultModal').classList.add('hidden'); }

function closeQuiz() {
    quizMode = false;
    quizQuestions = [];
    document.getElementById('quizSubmitPanel').classList.add('hidden');
    currentPage = 1;
    renderQuestions();
}

function updateStats() {
    var keys = Object.keys(submittedQuestions);
    var submittedCount = keys.length;

    document.getElementById('answeredCount').textContent = submittedCount;

    if (quizMode) {
        var quizAns = 0;
        for (var i = 0; i < quizQuestions.length; i++) {
            if (userAnswers[quizQuestions[i].id] && userAnswers[quizQuestions[i].id].length > 0) {
                quizAns++;
            }
        }
        document.getElementById('quizAnsweredBottom').textContent = quizAns;
    }
}

init();
</script>
