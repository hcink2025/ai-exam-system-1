<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人工智能训练师（三级）单选题考试系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .option-radio:checked + label,
        .wrong-option-radio:checked + label,
        .random-option-radio:checked + label {
            background-color: #dbeafe;
            border-color: #3b82f6;
        }
        .option-radio:checked + label .radio-dot,
        .wrong-option-radio:checked + label .radio-dot,
        .random-option-radio:checked + label .radio-dot {
            display: inline-block;
            color: #000;
        }
        .option-radio:checked + label .fa-circle,
        .wrong-option-radio:checked + label .fa-circle,
        .random-option-radio:checked + label .fa-circle {
            color: #3b82f6;
        }
        .correct-answer {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
        }
        .wrong-answer {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
        }
        .option-radio:checked + label .radio-dot,
        .wrong-option-radio:checked + label .radio-dot,
        .random-option-radio:checked + label .radio-dot {
            display: inline-block;
        }</style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 开始答题界面 -->
    <div id="start-screen" class="fixed inset-0 bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-10 max-w-lg w-full mx-4 text-center">
            <!-- Logo区域 -->
            <div class="mb-6 flex justify-center">
                <img src="F:/2图片/HC_副本_副本.png" alt="公司Logo" class="w-24 h-24 object-contain">
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">人工智能训练师（三级）</h1>
            <h2 class="text-2xl font-bold text-gray-700 mb-6">单选题考试系统</h2>
            <div class="bg-green-50 rounded-lg p-6 mb-6">
                <div class="grid grid-cols-2 gap-4 text-left">
                    <div class="flex items-center">
                        <i class="fa fa-list-ol text-green-600 mr-2"></i>
                        <span class="text-gray-700">题目数量：<strong>449</strong> 道</span>
                    </div>
                    <div class="flex items-center">
                        <i class="fa fa-star text-yellow-500 mr-2"></i>
                        <span class="text-gray-700">每题分数：<strong>1</strong> 分</span>
                    </div>
                    <div class="flex items-center">
                        <i class="fa fa-dot-circle-o text-green-600 mr-2"></i>
                        <span class="text-gray-700">题目类型：单选题</span>
                    </div>
                    <div class="flex items-center">
                        <i class="fa fa-clock-o text-orange-500 mr-2"></i>
                        <span class="text-gray-700">计时方式：自动计时</span>
                    </div>
                </div>
            </div>
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6 text-left">
                <div class="flex">
                    <i class="fa fa-info-circle text-yellow-400 mr-2 mt-1"></i>
                    <div>
                        <p class="text-sm text-gray-700">
                            <strong>考试说明：</strong>
                        </p>
                        <ul class="text-sm text-gray-600 mt-2 space-y-1">
                            <li>• 每道题只有一个正确答案</li>
                            <li>• 点击"开始答题"后计时器自动启动</li>
                            <li>• 答题完成后点击"提交答案"查看结果</li>
                            <li>• 错题自动加入错题集，可针对性练习</li>
                        </ul>
                    </div>
                </div>
            </div>


            <div class="flex gap-3">
                <button onclick="startExam()" class="w-full px-8 py-4 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-bold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                    <i class="fa fa-play mr-2"></i>
                    开始答题
                </button>
            </div>
            <div class="flex gap-3 mt-3">
                <button onclick="startRandomPractice()" class="w-full px-8 py-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-bold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                    <i class="fa fa-random mr-2"></i>
                    随机练习80题
                </button>
            </div>
            <div class="mt-4">
                <button onclick="clearWrongQuestionsSet()" class="text-sm text-gray-500 hover:text-red-500 transition">
                    <i class="fa fa-trash mr-1"></i>
                    清空错题集
                </button>
            </div>
        </div>
    </div>

    <!-- 错题集练习界面 -->
    <div id="wrong-questions-screen" class="fixed inset-0 bg-gray-100 hidden z-45 overflow-y-auto">
        <div class="container mx-auto px-4 py-8 max-w-4xl pt-20">
            <!-- 错题集头部 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-gray-800">
                        <i class="fa fa-exclamation-triangle text-orange-500"></i>
                        错题集练习
                    </h2>
                    <button onclick="closeWrongQuestionsSet()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                        <i class="fa fa-arrow-left mr-2"></i>
                        返回
                    </button>
                </div>
                <div class="text-gray-600" id="wrong-questions-info">
                    正在加载错题集...
                </div>
            </div>

            <!-- 错题列表 -->
            <div id="wrong-questions-list" class="space-y-4 pb-20">
                <!-- 错题将动态加载 -->
            </div>

            <!-- 提交按钮 -->
            <div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg p-4 border-t z-50">
                <div class="container mx-auto max-w-4xl flex justify-between items-center">
                    <button onclick="closeWrongQuestionsSet()" class="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                        <i class="fa fa-arrow-left"></i> 返回
                    </button>
                    <button onclick="submitWrongQuestionsPractice()" class="px-8 py-3 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition font-bold">
                        <i class="fa fa-check"></i> 提交练习
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 随机练习界面 -->
    <div id="random-practice-screen" class="fixed inset-0 bg-gray-100 hidden z-45 overflow-y-auto">
        <!-- 固定顶部信息栏 -->
        <div id="random-practice-header-bar" class="fixed top-0 left-0 right-0 bg-white shadow-lg z-40 hidden">
            <div class="container mx-auto px-4 py-2 max-w-4xl">
                <!-- Logo和标题居中 -->
                <div class="flex flex-col items-center justify-center text-center mb-2">
                    <div class="flex items-center justify-center gap-2 mb-1">
                        <img src="F:/2图片/HC_副本_副本.png" alt="公司Logo" class="w-6 h-6 object-contain">
                        <h2 class="text-lg font-bold text-gray-800 leading-tight">随机练习80题</h2>
                    </div>
                </div>

                <!-- 进度和用时 -->
                <div class="grid grid-cols-2 gap-2">
                    <!-- 答题进度 -->
                    <div class="bg-gray-50 rounded-lg p-1.5">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-medium text-gray-700">答题进度</span>
                            <span class="text-xs font-medium text-green-600" id="random-progress-text">0 / 80</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-1">
                            <div class="bg-green-600 h-1 rounded-full transition-all duration-300" id="random-progress-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- 用时 -->
                    <div class="bg-gray-50 rounded-lg p-1.5 flex justify-between items-center">
                        <span class="text-xs font-medium text-gray-700">
                            <i class="fa fa-clock-o text-green-600"></i> 用时
                        </span>
                        <span class="text-sm font-bold text-green-600" id="random-timer">00:00:00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 题目列表区域 -->
        <div class="container mx-auto px-4 max-w-4xl pt-32">
            <!-- 随机题目列表 -->
            <div id="random-questions-list" class="space-y-4 pb-20">
                <!-- 随机题目将动态加载 -->
            </div>
        </div>

        <!-- 提交按钮 -->
        <div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg p-3 border-t z-50">
            <div class="container mx-auto max-w-4xl flex justify-between gap-2">
                <button onclick="closeRandomPractice()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition text-sm">
                    <i class="fa fa-arrow-left"></i>
                    返回
                </button>
                <button onclick="continueRandomPractice()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition text-sm">
                    <i class="fa fa-refresh mr-1"></i>
                    继续练习
                </button>
                <button onclick="submitRandomPractice()" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-bold text-sm">
                    <i class="fa fa-check mr-1"></i>
                    提交练习
                </button>
            </div>
        </div>
    </div>

    <!-- 固定顶部信息栏 -->
    <div id="header-bar" class="fixed top-0 left-0 right-0 bg-white shadow-lg z-40 hidden">
        <div class="container mx-auto px-4 py-2 max-w-4xl">
            <!-- 头部 -->
            <header class="mb-3 relative">
                <!-- 错题集练习按钮 - 绝对定位在右侧 -->
                <button onclick="showWrongQuestionsSet()" class="absolute right-0 top-0 px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition text-sm font-medium">
                    <i class="fa fa-exclamation-triangle mr-1"></i>
                    错题集练习
                </button>

                <!-- 居中的Logo和标题 -->
                <div class="flex flex-col items-center justify-center text-center mb-2">
                    <div class="flex items-center justify-center gap-2 mb-1">
                        <img src="F:/2图片/HC_副本_副本.png" alt="公司Logo" class="w-8 h-8 object-contain">
                        <h1 class="text-xl font-bold text-gray-800 leading-tight">人工智能训练师（三级）单选题考试系统</h1>
                    </div>
                    <p class="text-gray-600 text-xs">共 449 道题目，每题 1 分</p>
                </div>
            </header>

            <!-- 进度条和计时器 -->
            <!-- 答题进度 -->
            <div class="bg-gray-50 rounded-lg p-1.5 mb-1.5">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-xs font-medium text-gray-700">答题进度</span>
                    <span class="text-xs font-medium text-green-600" id="progress-text">0 / 449</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-1">
                    <div class="bg-green-600 h-1 rounded-full transition-all duration-300" id="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <!-- 用时 -->
            <div class="bg-gray-50 rounded-lg p-1.5 mb-1.5 flex justify-between items-center">
                <span class="text-xs font-medium text-gray-700">
                    <i class="fa fa-clock-o text-green-600"></i> 用时
                </span>
                <span class="text-sm font-bold text-green-600" id="timer">00:00:00</span>
            </div>

            <!-- 搜索框 -->
            <div class="relative">
                <input type="text"
                       id="search-input"
                       placeholder="搜索题干内容..."
                       class="w-full px-3 py-1.5 pl-9 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition text-xs"
                       oninput="searchQuestions(this.value)">
                <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs"></i>
                <button onclick="clearSearch()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition text-xs" id="clear-search-btn" style="display: none;">
                    <i class="fa fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="container mx-auto px-4 max-w-4xl pt-60">
        <!-- 题目列表 -->
        <div id="questions-container" class="space-y-4 pb-20 hidden">
            <!-- 题目将通过JavaScript动态加载 -->
        </div>
    </div>

    <!-- 提交按钮 -->
    <div id="submit-bar" class="fixed bottom-0 left-0 right-0 bg-white shadow-lg p-3 border-t z-50 hidden">
            <div class="container mx-auto max-w-4xl flex justify-between items-center">
                <button onclick="resetAll()" class="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                    <i class="fa fa-refresh"></i> 重置
                </button>
                <button onclick="submitExam()" class="px-8 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-bold">
                    <i class="fa fa-check"></i> 提交答案
                </button>
            </div>
        </div>

        <!-- 搜索结果弹窗 -->
        <div id="search-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-xl p-6 max-w-4xl w-full mx-4 max-h-[80vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">
                        <i class="fa fa-search text-green-600 mr-2"></i>
                        搜索结果
                    </h2>
                    <button onclick="closeSearchModal()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
                <div id="search-results" class="space-y-3">
                    <!-- 搜索结果将动态加载 -->
                </div>
            </div>
        </div>

        <!-- 结果弹窗 -->
        <div id="result-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-xl p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <h2 class="text-2xl font-bold text-center mb-6" id="result-title"></h2>
                <div id="result-content"></div>
                <div class="flex justify-center gap-4 mt-6">
                    <button onclick="closeModal()" class="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600">
                        关闭
                    </button>
                    <button onclick="reviewWrongAnswers()" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                        查看错题
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 题目数据（内嵌）

            // 收集已答题数

            // 更新进度条
            const progress = answeredQuestions.size;
            const total = questions.length;

        function formatTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // ==================== 提交答案 ====================
        function submitExam() {
            // 停止计时器
            stopTimer();

            // 收集用户答案
            const radios = document.querySelectorAll('.option-radio:checked');

            if (radios.length === 0) {
                alert('你还没有作答任何题目！');
                startTimer();
                return;
            }

            radios.forEach(radio => {
                const qNum = radio.dataset.question;
                const optLetter = radio.dataset.option;
                userAnswers[qNum] = optLetter;
            });

            // 检查是否有未完成的题目
            const answeredCount = Object.keys(userAnswers).length;
            if (answeredCount < questions.length) {
                if (!confirm(`你还有 ${questions.length - answeredCount} 道题未作答，确定要提交吗？`)) {
                    startTimer();
                    return;
                }
            }

            // 批改并显示结果
            gradeExam();
        }

        // ==================== 批改试卷 ====================
        function gradeExam() {
            let correctCount = 0;
            let wrongCount = 0;
            const wrongQuestions = [];

            questions.forEach(question => {
                const userAns = userAnswers[question.number] || null;
                const correctOption = question.options.find(opt => opt.is_correct);
                const correctAns = correctOption ? correctOption.letter : null;

                const isCorrect = userAns === correctAns;

                if (isCorrect) {
                    correctCount++;
                } else {
                    wrongCount++;
                    wrongQuestions.push({
                        question: question,
                        userAns: userAns,
                        correctAns: correctAns
                    });

                    // 添加到错题集
                    addToWrongQuestionsSet(question);
                }

                // 显示反馈
                showFeedback(question, userAns, correctAns, isCorrect);
            });

            // 显示结果
            showResultModal(correctCount, wrongCount, wrongQuestions);
        }

        // ==================== 显示反馈 ====================
        function showFeedback(question, userAns, correctAns, isCorrect) {
            const feedbackEl = document.getElementById(`feedback-${question.number}`);
            const questionEl = document.getElementById(`question-${question.number}`);

            feedbackEl.classList.remove('hidden');

            // 禁用所有单选框
            questionEl.querySelectorAll('.option-radio').forEach(radio => {
                radio.disabled = true;
                const label = radio.nextElementSibling;
                const optLetter = radio.dataset.option;

                // 移除之前的样式
                label.classList.remove('correct-answer', 'wrong-answer');

                // 添加样式
                const option = question.options.find(opt => opt.letter === optLetter);
                if (option && option.is_correct) {
                    label.classList.add('correct-answer');
                } else if (optLetter === userAns) {
                    label.classList.add('wrong-answer');
                }
            });

            // 显示反馈信息
            if (isCorrect) {
                feedbackEl.innerHTML = `
                    <div class="flex items-center text-green-600">
                        <i class="fa fa-check-circle text-xl mr-2"></i>
                        <span class="font-medium">回答正确！</span>
                    </div>
                `;
            } else {
                const correctOptionText = question.options.find(opt => opt.is_correct)?.text || '';
                const userOptionText = question.options.find(opt => opt.letter === userAns)?.text || '';

                feedbackEl.innerHTML = `
                    <div class="text-red-600">
                        <div class="flex items-center mb-2">
                            <i class="fa fa-times-circle text-xl mr-2"></i>
                            <span class="font-medium">回答错误</span>
                        </div>
                        <div class="text-sm">
                            <p><strong>你的答案：</strong>${userAns ? `${userAns}. ${userOptionText}` : '未作答'}</p>
                            <p><strong>正确答案：</strong>${correctAns}. ${correctOptionText}</p>

        // ==================== 错题集功能 ====================
        function loadWrongQuestionsSet() {
            const saved = localStorage.getItem(WRONG_QUESTIONS_KEY);
            if (saved) {
                try {
                    wrongQuestionsSet = JSON.parse(saved);
                } catch (e) {
                    console.error('加载错题集失败:', e);
                    wrongQuestionsSet = [];
                }
            }

        function saveWrongQuestionsSet() {
            localStorage.setItem(WRONG_QUESTIONS_KEY, JSON.stringify(wrongQuestionsSet));
        }

        function addToWrongQuestionsSet(question) {
            // 检查是否已存在
            const exists = wrongQuestionsSet.find(q => q.number === question.number);
            if (!exists) {
                wrongQuestionsSet.push(question);
                saveWrongQuestionsSet();
            }

            wrongQuestionsSet = wrongQuestionsSet.filter(q => q.number !== questionNum);
            saveWrongQuestionsSet();

        // ==================== 批改错题练习 ====================
        function gradeWrongQuestionsPractice(practiceAnswers) {
            let correctCount = 0;
            let wrongCount = 0;
            const toRemove = []; // 要从错题集中移除的题目

            wrongQuestionsSet.forEach(q => {
                const userAns = practiceAnswers[q.number] || null;
                const correctOption = q.options.find(o => o.is_correct);
                const correctAns = correctOption ? correctOption.letter : null;
                const isCorrect = userAns === correctAns;

                if (isCorrect) {
                    correctCount++;
                    toRemove.push(q.number);
                } else {
                    wrongCount++;
                }

                // 显示反馈
                showWrongQuestionsFeedback(q, userAns, correctAns, isCorrect);
            });

            // 移除答对的题目
            toRemove.forEach(qNum => {
                removeFromWrongQuestionsSet(qNum);
            });

            // 显示结果
            alert(`练习完成！\n答对：${correctCount} 题\n答错：${wrongCount} 题\n${toRemove.length > 0 ? `已从错题集中移除 ${toRemove.length} 道题目` : ''}`);

            if (wrongQuestionsSet.length === 0) {

                feedbackEl.innerHTML = `
                    <div class="text-red-600">
                        <div class="flex items-center mb-2">
                            <i class="fa fa-times-circle text-xl mr-2"></i>
                            <span class="font-medium">回答错误</span>
                        </div>
                        <div class="text-sm">
                            <p><strong>你的答案：</strong>${userAns ? `${userAns}. ${userOptionText}` : '未作答'}</p>
                            <p><strong>正确答案：</strong>${correctAns}. ${correctOptionText}</p>
                        </div>
                    </div>
                `;
            }
        }

        // 显示随机练习结果弹窗
        function showRandomResultModal(correctCount, wrongCount, wrongQuestions) {
            const percentage = ((correctCount / randomPracticeQuestions.length) * 100).toFixed(1);
            const pass = correctCount >= randomPracticeQuestions.length * 0.6;

            const modalHtml = `
                <div id="random-result-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div class="bg-white rounded-lg shadow-xl p-8 max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                        <div class="text-center mb-6">
                            <div class="text-6xl mb-4">${pass ? '🎉' : '💪'}</div>
                            <h2 class="text-3xl font-bold ${pass ? 'text-green-600' : 'text-orange-600'} mb-2">
                                ${pass ? '练习完成！' : '继续加油！'}
                            </h2>
                            <p class="text-gray-600">
                                ${pass ? '你已经掌握了大部分知识点' : '还需要多加练习哦'}
                            </p>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-6">
                            <div class="bg-green-50 rounded-lg p-4 text-center">
                                <div class="text-3xl font-bold text-green-600">${correctCount}</div>
                                <div class="text-sm text-gray-600">答对题数</div>
                            </div>
                            <div class="bg-red-50 rounded-lg p-4 text-center">
                                <div class="text-3xl font-bold text-red-600">${wrongCount}</div>
                                <div class="text-sm text-gray-600">答错题数</div>
                            </div>
                            <div class="bg-blue-50 rounded-lg p-4 text-center">
                                <div class="text-3xl font-bold text-blue-600">${percentage}%</div>
                                <div class="text-sm text-gray-600">正确率</div>
                            </div>
                        </div>

                        <div class="text-gray-600 mb-6">
                            <div class="text-center">
                                <p>总用时：<strong>${formatTime(randomElapsedTime)}</strong></p>
                            </div>
                        </div>

                        ${wrongCount > 0 ? `
                            <div class="mb-6">
                                <h3 class="text-lg font-bold text-gray-800 mb-3">
                                    <i class="fa fa-exclamation-triangle text-orange-500"></i>
                                    答错的题目
                                </h3>
                                <div class="space-y-4 max-h-96 overflow-y-auto">
                                    ${wrongQuestions.map(wq => `
                                        <div class="bg-orange-50 rounded-lg p-4 border-l-4 border-orange-400">
                                            <div class="mb-3">
                                                <span class="inline-block bg-orange-500 text-white text-xs px-2 py-1 rounded mb-2">第${wq.question.number}题</span>
                                                <p class="font-medium text-gray-800 text-base">${wq.question.question}</p>
                                            </div>
                                            <div class="text-sm space-y-2">
                                                <div class="flex items-start">
                                                    <i class="fa fa-times-circle text-red-500 mt-1 mr-2"></i>
                                                    <div>
                                                        <span class="font-medium text-gray-700">你的答案：</span>
                                                        <span class="text-red-600">${wq.userAns ? `${wq.userAns}. ${wq.question.options.find(o => o.letter === wq.userAns)?.text || ''}` : '未作答'}</span>
                                                    </div>
                                                </div>
                                                <div class="flex items-start">
                                                    <i class="fa fa-check-circle text-green-500 mt-1 mr-2"></i>
                                                    <div>
                                                        <span class="font-medium text-gray-700">正确答案：</span>
                                                        <span class="text-green-600">${wq.correctAns}. ${wq.question.options.find(o => o.is_correct)?.text || ''}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <div class="flex gap-3">
                            <button onclick="closeRandomPracticeResult()" class="flex-1 px-6 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition font-bold">
                                <i class="fa fa-arrow-left mr-2"></i>
                                返回首页
                            </button>
                            <button onclick="backToRandomQuestions()" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-bold">
                                <i class="fa fa-eye mr-2"></i>
                                查看题目
                            </button>
                            <button onclick="restartRandomPractice()" class="flex-1 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-bold">
                                <i class="fa fa-random mr-2"></i>
                                再练一次
                            </button>
                        </div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        // 关闭随机练习结果弹窗
        function closeRandomPracticeResult() {
            const modal = document.getElementById('random-result-modal');
            if (modal) {
                modal.remove();
            }
            closeRandomPractice();
        }

        // 返回查看随机题目
        function backToRandomQuestions() {
            const modal = document.getElementById('random-result-modal');
            if (modal) {
                modal.remove();
            }
        }

        // 重新开始随机练习
        function restartRandomPractice() {
            const modal = document.getElementById('random-result-modal');
            if (modal) {
                modal.remove();
            }

            randomElapsedTime = 0;
            randomStartTime = null;
            startRandomPractice();
        }

        // 关闭随机练习
        function closeRandomPractice() {
            stopRandomTimer();

            document.getElementById('random-practice-header-bar').classList.add('hidden');
            document.getElementById('random-practice-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');

            const modal = document.getElementById('random-result-modal');
            if (modal) {
                modal.remove();
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== 搜索功能 ====================
        let searchTimeout = null;

        function searchQuestions(keyword) {
            const clearBtn = document.getElementById('clear-search-btn');

            if (keyword.trim()) {
                clearBtn.style.display = 'block';
            } else {
                clearBtn.style.display = 'none';
                closeSearchModal();
                return;
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                performSearch(keyword.trim());
            }, 300);
        }

        function performSearch(keyword) {
            if (!keyword) {
                closeSearchModal();
                return;
            }

            const results = questions.filter(q => {
                return q.question.toLowerCase().includes(keyword.toLowerCase());
            });

            showSearchResults(results, keyword);
        }

        function showSearchResults(results, keyword) {
            const modal = document.getElementById('search-modal');
            const resultsContainer = document.getElementById('search-results');

            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fa fa-search text-4xl mb-4"></i>
                        <p>未找到包含"${keyword}"的题目</p>
                    </div>
                `;
            } else {
                resultsContainer.innerHTML = results.map(q => {
                    const highlightedQuestion = highlightKeyword(q.question, keyword);

                    return `
                        <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 hover:border-green-400 transition cursor-pointer" onclick="jumpToQuestion(${q.number})">
                            <div class="flex items-start gap-3">
                                <span class="flex-shrink-0 w-8 h-8 bg-green-600 text-white rounded-full flex items-center justify-center font-bold text-sm">
                                    ${q.number}
                                </span>
                                <div class="flex-1">
                                    <h3 class="font-medium text-gray-800 mb-2">${highlightedQuestion}</h3>
                                    <div class="flex flex-wrap gap-2">
                                        ${q.options.map(opt => {
                                            if (opt.is_correct) {
                                                return `
                                                    <span class="inline-flex items-center px-2 py-1 bg-green-100 text-green-800 rounded text-xs">
                                                        <i class="fa fa-check mr-1"></i>
                                                        ${opt.letter}. ${opt.text}
                                                    </span>
                                                `;
                                            } else {
                                                return `
                                                    <span class="inline-flex items-center px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">
                                                        ${opt.letter}. ${opt.text}
                                                    </span>
                                                `;
                                            }
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function highlightKeyword(text, keyword) {
            if (!keyword) return text;
            const regex = new RegExp(`(${keyword})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 px-1 rounded">$1</mark>');
        }

        function jumpToQuestion(questionNum) {
            closeSearchModal();

            const questionElement = document.getElementById(`question-${questionNum}`);
            if (questionElement) {
                questionElement.scrollIntoView({ behavior: 'smooth', block: 'center' });

                questionElement.classList.add('ring-4', 'ring-green-400', 'ring-opacity-50');
                setTimeout(() => {
                    questionElement.classList.remove('ring-4', 'ring-green-400', 'ring-opacity-50');
                }, 2000);
            }
        }

        function clearSearch() {
            const searchInput = document.getElementById('search-input');
            searchInput.value = '';
            searchQuestions('');
        }

        function closeSearchModal() {
            const modal = document.getElementById('search-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body>
</html>
